<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Green Wheels Bicycle Rental - Bike Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ================= HEADER ================= -->
  <header id="page-header">
    <h1>🚲 Green Wheels Bicycle Rental</h1>
    <p>Bike Management (Proof of Concept)</p>
  </header>

  <!-- ================= REPORT SECTION ================= -->
  <section id="report-section" class="box">
    <h2>Quick Report</h2>
    <p id="report-text">Loading report...</p>
  </section>

  <!-- ================= ADD / EDIT BIKE FORM ================= -->
  <section id="form-section" class="box">
    <h2 id="form-title">Add a New Bike</h2>

    <!-- This hidden input stores the id of the bike being edited.
         It stays empty when we are adding a NEW bike. -->
    <input type="hidden" id="bike-id" value="" />

    <label for="bikeNumber">Bike Number:</label>
    <input type="text" id="bikeNumber" placeholder="e.g. BK-001" />

    <label for="bikeType">Bike Type:</label>
    <input type="text" id="bikeType" placeholder="e.g. Mountain" />

    <label for="brand">Brand:</label>
    <input type="text" id="brand" placeholder="e.g. Trek" />

    <label for="colour">Colour:</label>
    <input type="text" id="colour" placeholder="e.g. Red" />

    <label for="hourlyRate">Hourly Rate:</label>
    <input type="number" id="hourlyRate" placeholder="e.g. 5" step="0.01" />

    <label for="status">Status:</label>
    <select id="status">
      <option value="Available">Available</option>
      <option value="Rented">Rented</option>
      <option value="Maintenance">Maintenance</option>
    </select>

    <br />

    <button id="save-button" class="btn-primary" onclick="saveBike()">Add Bike</button>
    <button id="cancel-button" class="btn-secondary" onclick="cancelEdit()" style="display:none;">Cancel</button>

    <p id="form-message"></p>
  </section>

  <!-- ================= SEARCH AND SORT ================= -->
  <section id="controls-section" class="box">
    <label for="search-box">Search:</label>
    <input
      type="text"
      id="search-box"
      placeholder="Search by number, brand, type, or status"
      onkeyup="loadBikes()"
    />

    <label for="sort-select">Sort by:</label>
    <select id="sort-select" onchange="loadBikes()">
      <option value="">Newest First</option>
      <option value="type">Type</option>
      <option value="brand">Brand</option>
      <option value="hourlyRate">Hourly Rate</option>
      <option value="status">Status</option>
    </select>
  </section>

  <!-- ================= BIKE TABLE ================= -->
  <section id="table-section" class="box">
    <h2>All Bikes</h2>
    <table id="bike-table">
      <thead>
        <tr>
          <th>Bike Number</th>
          <th>Type</th>
          <th>Brand</th>
          <th>Colour</th>
          <th>Hourly Rate</th>
          <th>Status</th>
          <th>Last Service Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="bike-table-body">
        <!-- Rows are added here dynamically by script.js -->
      </tbody>
    </table>
  </section>

  <footer id="page-footer">
    <p>Green Wheels Bicycle Rental</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
